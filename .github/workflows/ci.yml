name: CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v7
    - name: Build
      run: cargo build --verbose

    - name: Upload dynstallerbinary
      uses: actions/upload-artifact@v7
      with:
        name: dynstaller-binary-${{ runner.os }}
        path: |
          target/debug/dynstaller${{ matrix.os == 'windows-latest' && '.exe' || '' }}

    - name: Run tests
      run: cargo test --verbose

  clippy:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7
    - name: Run Clippy
      run: |
        cargo clippy --version
        cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Check formatting
      run: |
        cargo fmt --version
        cargo fmt -- --check
